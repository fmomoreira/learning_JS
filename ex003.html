<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa...</title>
    <style>
        body {
            background-color: rgb(60, 60, 223);
            color: white;       /* comentário em CCS */
            font: normal 20pt arial;
        }
        h1 {
            color: rgb(103, 39, 163);
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>    <!-- comentário em HTML -->
    <p>já me livrei da maldição</p>
    <script>
        
        //unica linha

        /*
        para
        varias
        linhas
        */

        var n1 = Number(window.prompt('digite um um número: ')) //Number(n1) decide pro conta propria entre Int e Float
        var n2 = Number(window.prompt('digite outro número: ')) //Number.parseInt(n2) força o inteiro, Number.parseFloat(n2) força o valor real
        var s = n1 + n2 
        window.alert(`A soma entre ${n1} e ${n2} é igual a ${s}`) // concatenação     ou s.toString() para converter para string
        // (number + number) para adição
        // (string + string) concatenação
    </script>
</body>
</html>
