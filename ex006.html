<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM Aula 10</title>
    <style>
        div#area {
            font: normal 20pt Arial;
            background: rgb(32, 130, 31);
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="area"> <!--  onclick="clicar()" onmouseenter="entrar()" onmouseout="sair()">   para controlar a chamada de eventos no HTML -->
        Interaja...
    </div>

    <script>
        var a = window.document.getElementById('area') // Variavel global
        a.addEventListener('click', clicar)    // para controlar a chamada dos eventos dentro do JavaScript
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', sair)

        function clicar() {
            a.innerText = 'Clicou!'
            a.style.background = 'red'
        }
        function entrar() {
            a.innerText = 'Entrou!'
        }
        function sair() {
            a.innerText = 'Saiu!'
            a.style.background = 'green'
        }
    </script>
</body>
</html>
