<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 06 exercicio 004</title>
    <style>
        body {
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt("Qual o seu nome?") //  .toLocaleString('pt-BR' , {style: 'currency' , currency: 'BRL'}) para localizar e definir um valor monetário
        document.write(`Olá <strong>${nome}</strong>!, Seu nome tem ${nome.length} letras.<br/>`) //<strong> para deixar em negrito </strong>
        document.write(`Seu nome em maiusculas é ${nome.toUpperCase()}<br/>`) // <br/> para quebrar linha
        document.write(`Seu nome em minuscula é ${nome.toLowerCase()}`) // .toFixed(2) para controlar as casas decimais de um número
    </script>              
</body>
</html>
